services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DATABASE_URL: sqlite+aiosqlite:////app/data/usage.db
      CORS_ORIGINS: http://localhost,http://localhost:80,http://localhost:8080,http://127.0.0.1,http://127.0.0.1:80,http://127.0.0.1:8080
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  backend_data:
